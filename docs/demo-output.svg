<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="agent-ready demo output">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="1" stop-color="#17261f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#72e6a2" stroke-width="1">
    <path d="M0 110H1200M0 220H1200M0 330H1200M0 440H1200M0 550H1200"/>
    <path d="M120 0V675M240 0V675M360 0V675M480 0V675M600 0V675M720 0V675M840 0V675M960 0V675M1080 0V675"/>
  </g>
  <text x="80" y="90" fill="#f7f3e8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="48" font-weight="700">agent-ready</text>
  <text x="80" y="132" fill="#9fb7a9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">CI for AI coding context</text>
  <rect x="80" y="175" width="1040" height="395" rx="22" fill="#0b0f12" stroke="#2d4438" filter="url(#shadow)"/>
  <circle cx="115" cy="213" r="8" fill="#ff6b6b"/><circle cx="143" cy="213" r="8" fill="#ffd166"/><circle cx="171" cy="213" r="8" fill="#72e6a2"/>
  <text x="115" y="270" fill="#72e6a2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28">$ agent-ready . --score</text>
  <text x="115" y="323" fill="#f7f3e8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="34" font-weight="700">agent-readiness: 100/100 (A)</text>
  <text x="115" y="390" fill="#72e6a2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28">$ agent-ready . --check</text>
  <text x="115" y="443" fill="#f7f3e8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="32">agent-ready files are current</text>
  <text x="115" y="510" fill="#9fb7a9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">Generates AGENTS.md · CLAUDE.md · CODEX.md · .agent/context.json</text>
  <rect x="805" y="66" width="315" height="70" rx="35" fill="#183c2b" stroke="#72e6a2"/>
  <text x="845" y="111" fill="#72e6a2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700">READY FOR AGENTS</text>
</svg>
