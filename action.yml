name: Agent Ready Check
description: Generate and verify AI coding-agent context files for a repository.
author: Adam Chau
branding:
  icon: check-circle
  color: green
inputs:
  path:
    description: Repository path to scan.
    required: false
    default: .
  mode:
    description: Use check, score, json-score, or refresh.
    required: false
    default: check
  extra-args:
    description: Extra arguments passed to agent-ready.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Install agent-ready
      shell: bash
      run: python -m pip install agent-ready
    - name: Run agent-ready
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.mode }}" in
          check)
            agent-ready "${{ inputs.path }}" --check ${{ inputs.extra-args }}
            ;;
          score)
            agent-ready "${{ inputs.path }}" --score ${{ inputs.extra-args }}
            ;;
          json-score)
            agent-ready "${{ inputs.path }}" --json --score ${{ inputs.extra-args }}
            ;;
          refresh)
            agent-ready "${{ inputs.path }}" --write --force ${{ inputs.extra-args }}
            ;;
          *)
            echo "Unsupported mode: ${{ inputs.mode }}" >&2
            exit 2
            ;;
        esac
